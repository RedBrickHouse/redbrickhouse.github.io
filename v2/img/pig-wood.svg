    <path d="M448,344 L536,438" stroke="#75512a" stroke-width="3" opacity=".5"/>
  </g>

  <!-- window -->
  <rect x="348" y="474" width="44" height="42" rx="2" fill="#54492e" filter="url(#wd2)"/>
  <rect x="348" y="474" width="44" height="42" rx="2" fill="none" stroke="#e6d3a0" stroke-width="4.5" opacity=".95" filter="url(#wd2)"/>

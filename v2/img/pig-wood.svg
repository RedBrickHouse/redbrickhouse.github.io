<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Wooden cabin at a bright forest edge">
<defs>
  <linearGradient id="wsky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#f1f7ea"/>
    <stop offset=".5" stop-color="#f9f3d7"/>
    <stop offset="1" stop-color="#f4e6b2"/>
  </linearGradient>
  <radialGradient id="wsun" cx=".30" cy=".16" r=".62">
    <stop offset="0" stop-color="#fffdEE" stop-opacity="1"/>
    <stop offset=".38" stop-color="#fdf4cb" stop-opacity=".55"/>
    <stop offset="1" stop-color="#fdf4cb" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="wground2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#cfd291"/>
    <stop offset="1" stop-color="#84944f"/>
  </linearGradient>
  <linearGradient id="wwall" x1="0" y1="0" x2="1" y2=".1">
    <stop offset="0" stop-color="#c2925c"/>
    <stop offset=".55" stop-color="#a97a44"/>
    <stop offset="1" stop-color="#875f32"/>
  </linearGradient>
  <linearGradient id="wroof" x1="0" y1="0" x2="1" y2=".08">
    <stop offset="0" stop-color="#a5794a"/>
    <stop offset=".5" stop-color="#875e33"/>
    <stop offset="1" stop-color="#6a4725"/>
  </linearGradient>
  <radialGradient id="wvig" cx=".5" cy=".46" r=".8">
    <stop offset=".58" stop-color="#5c6636" stop-opacity="0"/>
    <stop offset="1" stop-color="#5c6636" stop-opacity=".14"/>
  </radialGradient>
  <filter id="wd1" x="-12%" y="-12%" width="124%" height="124%">
    <feTurbulence type="fractalNoise" baseFrequency=".012 .02" numOctaves="3" seed="21" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="16"/>
  </filter>
  <filter id="wd2" x="-14%" y="-14%" width="128%" height="128%">
    <feTurbulence type="fractalNoise" baseFrequency=".03 .05" numOctaves="2" seed="14" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="9"/>
  </filter>
  <filter id="wcan" x="-18%" y="-18%" width="136%" height="136%">
    <feTurbulence type="fractalNoise" baseFrequency=".03 .045" numOctaves="3" seed="31" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="24" result="d"/>
    <feGaussianBlur in="d" stdDeviation="1.2"/>
  </filter>
  <filter id="wcl" x="-40%" y="-40%" width="180%" height="180%">
    <feTurbulence type="fractalNoise" baseFrequency=".016 .03" numOctaves="3" seed="6" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="26" result="d"/>
    <feGaussianBlur in="d" stdDeviation="5"/>
  </filter>
  <filter id="wb1" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.2"/></filter>
  <filter id="wb3" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3"/></filter>
  <filter id="wb8" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="8"/></filter>
  <filter id="wb14" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="14"/></filter>
  <filter id="wgrain">
    <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" seed="17"/>
    <feColorMatrix type="matrix" values="0 0 0 0 .35  0 0 0 0 .38  0 0 0 0 .2  0 0 0 .6 0"/>
  </filter>
  <g id="grow" fill="none" stroke-linecap="round">
    <path d="M0,0 c-1,-7 -2,-13 -4,-18"/>
    <path d="M19,2 c0,-8 0,-15 1,-22"/>
    <path d="M38,0 c1,-7 3,-12 6,-16"/>
    <path d="M57,1 c-1,-8 -1,-14 0,-20"/>
    <path d="M76,0 c-2,-7 -4,-13 -7,-17"/>
    <path d="M95,2 c1,-8 1,-15 0,-22"/>
    <path d="M114,0 c2,-7 4,-12 7,-15"/>
    <path d="M133,1 c0,-7 -1,-13 -2,-19"/>
    <path d="M152,0 c1,-8 2,-14 4,-20"/>
    <path d="M171,2 c-1,-7 -2,-13 -3,-18"/>
    <path d="M190,0 c0,-7 1,-13 3,-19"/>
    <path d="M209,1 c-2,-8 -3,-14 -3,-20"/>
    <path d="M228,0 c1,-7 2,-13 2,-18"/>
    <path d="M247,2 c0,-8 -1,-14 -3,-21"/>
    <path d="M266,0 c2,-7 3,-13 3,-18"/>
    <path d="M285,1 c-1,-7 -1,-13 0,-18"/>
    <path d="M304,0 c-2,-8 -3,-14 -2,-21"/>
    <path d="M323,2 c1,-7 2,-12 4,-17"/>
    <path d="M342,0 c0,-7 0,-13 1,-19"/>
    <path d="M361,1 c-1,-7 -2,-13 -2,-18"/>
  </g>
</defs>

<!-- sky -->
<rect width="800" height="800" fill="url(#wsky)"/>
<rect width="800" height="800" fill="url(#wsun)"/>

<!-- soft clouds -->
<g filter="url(#wcl)">

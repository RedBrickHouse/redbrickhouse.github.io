    <ellipse cx="290" cy="155" rx="48" ry="15"/>
  </g>
  <ellipse cx="252" cy="178" rx="70" ry="9" fill="#e8e0bc" opacity=".45"/>
  <g fill="#fffbe6" opacity=".75">

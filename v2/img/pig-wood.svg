  <path d="M676,560 C674,512 670,460 664,414" fill="none" stroke="#6d4c2c" stroke-width="14" stroke-linecap="round" filter="url(#wd2)"/>
  <path d="M666,420 C656,398 642,384 626,374 M666,424 C676,400 690,388 704,380" fill="none" stroke="#6d4c2c" stroke-width="8" stroke-linecap="round" filter="url(#wd2)"/>

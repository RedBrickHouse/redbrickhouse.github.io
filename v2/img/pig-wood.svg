  <path d="M404,562 L404,488 Q431,474 458,488" fill="none" stroke="#3a270f" stroke-width="4" opacity=".8"/>
  <path d="M407,556 L407,491 Q419,483 430,481" fill="none" stroke="#a97a44" stroke-width="3" opacity=".7"/>
  <circle cx="450" cy="528" r="2.6" fill="#d8ac6f" opacity=".9"/>

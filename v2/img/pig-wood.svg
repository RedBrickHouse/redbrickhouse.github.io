  <path d="M352,480 l12,-5" stroke="#f6efd2" stroke-width="3" opacity=".6"/>
  <rect x="344" y="516" width="52" height="6" fill="#e6d3a0" opacity=".9" filter="url(#wd2)"/>

  <!-- door -->

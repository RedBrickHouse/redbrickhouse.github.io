<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#E8F5E9"/>
  <!-- Hills -->
  <ellipse cx="100" cy="350" rx="150" ry="80" fill="#A5D6A7"/>
  <ellipse cx="300" cy="360" rx="180" ry="70" fill="#81C784"/>
  <!-- Castle -->
  <rect x="150" y="160" width="100" height="120" fill="#FFCC80"/>
  <rect x="140" y="130" width="20" height="50" fill="#FFB74D"/>
  <rect x="240" y="130" width="20" height="50" fill="#FFB74D"/>
  <rect x="180" y="100" width="40" height="80" fill="#FFB74D"/>
  <!-- Castle details -->
  <rect x="140" y="125" width="6" height="10" fill="#FF9800"/><rect x="148" y="125" width="6" height="10" fill="#FF9800"/><rect x="156" y="125" width="6" height="10" fill="#FF9800"/>
  <rect x="240" y="125" width="6" height="10" fill="#FF9800"/><rect x="248" y="125" width="6" height="10" fill="#FF9800"/><rect x="256" y="125" width="6" height="10" fill="#FF9800"/>
  <!-- Flag -->
  <line x1="200" y1="100" x2="200" y2="70" stroke="#795548" stroke-width="2"/>
  <polygon points="200,70 225,80 200,90" fill="#EF5350"/>
  <!-- Houses -->
  <rect x="60" y="260" width="40" height="35" fill="#FFAB91"/><polygon points="55,265 80,240 105,265" fill="#E57373"/>
  <rect x="300" y="270" width="35" height="30" fill="#CE93D8"/><polygon points="295,275 317,252 340,275" fill="#AB47BC"/>
  <!-- Trees -->
  <rect x="270" y="250" width="8" height="30" fill="#795548"/><circle cx="274" cy="240" r="18" fill="#66BB6A"/>
  <rect x="120" y="260" width="6" height="25" fill="#795548"/><circle cx="123" cy="252" r="14" fill="#4CAF50"/>
  <!-- Clouds -->
  <g fill="#fff" opacity="0.7">
    <circle cx="80" cy="80" r="20"/><circle cx="100" cy="75" r="25"/><circle cx="125" cy="80" r="18"/>
    <circle cx="300" cy="60" r="18"/><circle cx="320" cy="55" r="22"/><circle cx="340" cy="60" r="16"/>
  </g>
  <text x="200" y="380" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4CAF50" opacity="0.6" letter-spacing="4">TINY KINGDOMS</text>
</svg>

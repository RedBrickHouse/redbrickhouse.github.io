<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1a1a2e"/>
  <!-- Dungeon walls -->
  <rect x="0" y="300" width="400" height="100" fill="#263238"/>
  <rect x="0" y="0" width="60" height="400" fill="#263238"/>
  <rect x="340" y="0" width="60" height="400" fill="#263238"/>
  <!-- Torches -->
  <rect x="75" y="120" width="8" height="30" fill="#5D4037"/>
  <ellipse cx="79" cy="115" rx="10" ry="14" fill="#FF9800" opacity="0.8"/>
  <ellipse cx="79" cy="112" rx="6" ry="10" fill="#FFD54F" opacity="0.6"/>
  <rect x="317" y="120" width="8" height="30" fill="#5D4037"/>
  <ellipse cx="321" cy="115" rx="10" ry="14" fill="#FF9800" opacity="0.8"/>
  <ellipse cx="321" cy="112" rx="6" ry="10" fill="#FFD54F" opacity="0.6"/>
  <!-- Door/portal -->
  <rect x="140" y="180" width="120" height="150" rx="60" fill="#0D47A1" opacity="0.5"/>
  <rect x="150" y="190" width="100" height="140" rx="50" fill="#1565C0" opacity="0.4"/>
  <rect x="160" y="200" width="80" height="130" rx="40" fill="#1976D2" opacity="0.3"/>
  <!-- Skull -->
  <g transform="translate(180, 310)">
    <circle cx="20" cy="15" r="16" fill="#ECEFF1"/>
    <rect x="8" y="28" width="24" height="12" rx="2" fill="#ECEFF1"/>
    <circle cx="13" cy="13" r="4" fill="#1a1a2e"/>
    <circle cx="27" cy="13" r="4" fill="#1a1a2e"/>
    <rect x="16" y="22" width="3" height="5" fill="#1a1a2e"/>
    <rect x="21" y="22" width="3" height="5" fill="#1a1a2e"/>
  </g>
  <!-- Gems -->
  <polygon points="100,280 108,270 116,280 108,290" fill="#E040FB" opacity="0.7"/>
  <polygon points="290,260 296,252 302,260 296,268" fill="#00E676" opacity="0.7"/>
  <!-- Cobblestone floor -->
  <g stroke="#37474F" stroke-width="1" fill="none" opacity="0.5">
    <ellipse cx="120" cy="340" rx="30" ry="15"/><ellipse cx="200" cy="350" rx="35" ry="12"/>
    <ellipse cx="280" cy="340" rx="28" ry="14"/><ellipse cx="160" cy="370" rx="32" ry="13"/>
    <ellipse cx="240" cy="375" rx="30" ry="12"/>
  </g>
  <text x="200" y="390" text-anchor="middle" font-family="serif" font-size="12" fill="#7C4DFF" opacity="0.6" letter-spacing="5">VAULT OF SHADOWS</text>
</svg>

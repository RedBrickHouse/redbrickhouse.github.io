<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Sturdy red brick house under a clear sky">
<defs>
  <linearGradient id="bsky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#bedcec"/>
    <stop offset=".55" stop-color="#ddeef4"/>
    <stop offset="1" stop-color="#f2f6ec"/>
  </linearGradient>
  <radialGradient id="bsun" cx=".28" cy=".14" r=".6">
    <stop offset="0" stop-color="#fffef4" stop-opacity="1"/>
    <stop offset=".4" stop-color="#fdf8e2" stop-opacity=".5"/>
    <stop offset="1" stop-color="#fdf8e2" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="blawn" x1=".15" y1="0" x2=".6" y2="1">
    <stop offset="0" stop-color="#b7cd8d"/>
    <stop offset=".55" stop-color="#9cb573"/>
    <stop offset="1" stop-color="#7f9c58"/>
  </linearGradient>
  <linearGradient id="bwall" x1="0" y1="0" x2="1" y2=".08">
    <stop offset="0" stop-color="#c25239"/>
    <stop offset=".55" stop-color="#ad412c"/>
    <stop offset="1" stop-color="#933624"/>
  </linearGradient>
  <linearGradient id="broof" x1="0" y1="0" x2="1" y2=".1">
    <stop offset="0" stop-color="#84362a"/>
    <stop offset=".5" stop-color="#6e2c1e"/>
    <stop offset="1" stop-color="#571f14"/>
  </linearGradient>
  <linearGradient id="bglass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#a4bfca"/>
    <stop offset="1" stop-color="#d3e3ea"/>
  </linearGradient>
  <radialGradient id="bvig" cx=".5" cy=".46" r=".8">
    <stop offset=".58" stop-color="#5a5540" stop-opacity="0"/>
    <stop offset="1" stop-color="#5a5540" stop-opacity=".13"/>
  </radialGradient>
  <filter id="bd1" x="-12%" y="-12%" width="124%" height="124%">
    <feTurbulence type="fractalNoise" baseFrequency=".012 .02" numOctaves="3" seed="41" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="16"/>
  </filter>
  <filter id="bd2" x="-14%" y="-14%" width="128%" height="128%">
    <feTurbulence type="fractalNoise" baseFrequency=".03 .05" numOctaves="2" seed="44" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="8"/>
  </filter>
  <filter id="bcloud" x="-40%" y="-40%" width="180%" height="180%">
    <feTurbulence type="fractalNoise" baseFrequency=".015 .03" numOctaves="3" seed="9" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="30" result="d"/>
    <feGaussianBlur in="d" stdDeviation="5"/>
  </filter>
  <filter id="bb1" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.2"/></filter>
  <filter id="bb3" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3"/></filter>
  <filter id="bb8" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="8"/></filter>
  <filter id="bb14" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="14"/></filter>
  <filter id="bgrain">
    <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" seed="27"/>
    <feColorMatrix type="matrix" values="0 0 0 0 .42  0 0 0 0 .34  0 0 0 0 .26  0 0 0 .6 0"/>
  </filter>
  <clipPath id="bfacade"><path d="M306,356 L556,356 L560,560 L302,560 Z"/></clipPath>
  <g id="brow">
    <path d="M0,0 h24 M36,0 h24 M72,0 h24 M108,0 h24 M144,0 h24 M180,0 h24 M216,0 h24 M252,0 h24" stroke-width="8"/>
  </g>
  <g id="ggrow" fill="none" stroke-linecap="round">
    <path d="M0,0 c-1,-7 -2,-13 -4,-18"/>
    <path d="M19,2 c0,-8 0,-15 1,-22"/>
    <path d="M38,0 c1,-7 3,-12 6,-16"/>
    <path d="M57,1 c-1,-8 -1,-14 0,-20"/>
    <path d="M76,0 c-2,-7 -4,-13 -7,-17"/>
    <path d="M95,2 c1,-8 1,-15 0,-22"/>
    <path d="M114,0 c2,-7 4,-12 7,-15"/>
    <path d="M133,1 c0,-7 -1,-13 -2,-19"/>
    <path d="M152,0 c1,-8 2,-14 4,-20"/>
    <path d="M171,2 c-1,-7 -2,-13 -3,-18"/>
    <path d="M190,0 c0,-7 1,-13 3,-19"/>
    <path d="M209,1 c-2,-8 -3,-14 -3,-20"/>
    <path d="M228,0 c1,-7 2,-13 2,-18"/>
    <path d="M247,2 c0,-8 -1,-14 -3,-21"/>
    <path d="M266,0 c2,-7 3,-13 3,-18"/>
    <path d="M285,1 c-1,-7 -1,-13 0,-18"/>
    <path d="M304,0 c-2,-8 -3,-14 -2,-21"/>
    <path d="M323,2 c1,-7 2,-12 4,-17"/>
    <path d="M342,0 c0,-7 0,-13 1,-19"/>
    <path d="M361,1 c-1,-7 -2,-13 -2,-18"/>
  </g>
</defs>

<!-- sky -->
<rect width="800" height="800" fill="url(#bsky)"/>
<rect width="800" height="800" fill="url(#bsun)"/>

<!-- clouds -->
<g filter="url(#bcloud)">
  <g fill="#fffdf4">
    <ellipse cx="180" cy="200" rx="88" ry="24"/>
    <ellipse cx="230" cy="182" rx="56" ry="19"/>
    <ellipse cx="130" cy="188" rx="44" ry="15"/>
  </g>
  <ellipse cx="196" cy="210" rx="78" ry="11" fill="#e4ddc8" opacity=".55"/>
  <g fill="#fffdf4" opacity=".95">
    <ellipse cx="620" cy="150" rx="72" ry="19"/>
    <ellipse cx="662" cy="136" rx="42" ry="14"/>
  </g>
  <ellipse cx="632" cy="158" rx="60" ry="8" fill="#e4ddc8" opacity=".45"/>
  <ellipse cx="430" cy="116" rx="50" ry="12" fill="#fffdf4" opacity=".85"/>
</g>

<!-- distant treeline -->
<path d="M-30,502 C90,478 220,470 350,478 C500,487 660,478 830,496 L830,640 L-30,640 Z" fill="#b9cfa4" opacity=".92" filter="url(#bd1)"/>
<g fill="#a8c292" opacity=".55" filter="url(#bd2)">
  <ellipse cx="130" cy="502" rx="42" ry="16"/>
  <ellipse cx="240" cy="496" rx="34" ry="13"/>
  <ellipse cx="640" cy="498" rx="44" ry="15"/>
  <ellipse cx="742" cy="506" rx="34" ry="13"/>
</g>
<path d="M-30,530 C140,512 340,506 480,514 C620,521 720,514 830,524 L830,660 L-30,660 Z" fill="#9db884" opacity=".92" filter="url(#bd1)"/>

<!-- lawn -->
<path d="M-30,550 C200,536 560,536 830,548 L830,820 L-30,820 Z" fill="url(#blawn)" filter="url(#bd1)"/>
<!-- tonal patches / mow bands -->
<g filter="url(#bb14)">
  <ellipse cx="220" cy="640" rx="170" ry="34" fill="#d3dc9c" opacity=".33"/>
  <ellipse cx="640" cy="690" rx="180" ry="42" fill="#6d8a4a" opacity=".3"/>
  <ellipse cx="130" cy="760" rx="150" ry="40" fill="#5f7a40" opacity=".3"/>
  <ellipse cx="480" cy="628" rx="140" ry="26" fill="#e9e9b0" opacity=".3"/>
  <ellipse cx="710" cy="790" rx="150" ry="42" fill="#54703c" opacity=".26"/>
</g>
<path d="M-30,652 L830,596 L830,656 L-30,738 Z" fill="#f2e9b8" opacity=".28" filter="url(#bb14)"/>

<!-- path to door -->
<path d="M408,568 C402,618 380,700 340,782 L528,782 C482,698 458,616 456,568 Z" fill="#e3d4ae" opacity=".92" filter="url(#bd1)"/>
<g fill="none" stroke-linecap="round" filter="url(#bd2)">
  <path d="M408,568 C402,618 382,696 346,774" stroke="#ab9a6e" stroke-width="4" opacity=".4"/>
  <path d="M456,568 C458,618 478,696 520,774" stroke="#ab9a6e" stroke-width="4" opacity=".35"/>
  <path d="M410,610 h44 M400,656 h58 M388,706 h72 M374,756 h96" stroke="#b3a377" stroke-width="3" opacity=".3"/>
  <path d="M416,590 h34 M406,632 h50 M396,680 h62" stroke="#f4ecd4" stroke-width="2.5" opacity=".45"/>
</g>

<!-- house cast shadow -->
<ellipse cx="486" cy="568" rx="190" ry="21" fill="#4c5a30" opacity=".32" filter="url(#bb8)"/>

<!-- house -->
<g>
  <!-- facade -->
  <path d="M306,356 L556,356 L560,560 L302,560 Z" fill="url(#bwall)" filter="url(#bd2)"/>
  <g clip-path="url(#bfacade)">
    <g stroke="#cd5b40" opacity=".4">
      <use href="#brow" transform="translate(298,372)"/>
      <use href="#brow" transform="translate(282,404)"/>
      <use href="#brow" transform="translate(298,436)"/>
      <use href="#brow" transform="translate(282,468)"/>
      <use href="#brow" transform="translate(298,500)"/>
      <use href="#brow" transform="translate(282,532)"/>
    </g>
    <g stroke="#7e2c1c" opacity=".35">
      <use href="#brow" transform="translate(282,388)"/>
      <use href="#brow" transform="translate(298,420)"/>
      <use href="#brow" transform="translate(282,452)"/>
      <use href="#brow" transform="translate(298,484)"/>
      <use href="#brow" transform="translate(282,516)"/>
      <use href="#brow" transform="translate(298,548)"/>
    </g>
    <path d="M306,356 L318,560 L302,560 L306,356 Z" fill="#dd7350" opacity=".55"/>
    <path d="M544,356 L560,560 L534,560 L532,356 Z" fill="#6e2415" opacity=".45"/>
    <path d="M302,356 L560,356 L559,372 L303,372 Z" fill="#5e1f12" opacity=".3" filter="url(#bb3)"/>
  </g>

  <!-- cornice -->
  <path d="M300,350 L562,350 L562,362 L300,362 Z" fill="#f3ecd9" filter="url(#bd2)"/>
  <path d="M300,360 L562,360 L562,365 L300,365 Z" fill="#c9b995" opacity=".7" filter="url(#bd2)"/>

  <!-- gable + roof -->
  <path d="M306,356 L431,268 L556,356 Z" fill="#a03c28" filter="url(#bd2)"/>
  <path d="M316,352 L431,272 L436,282 L336,352 Z" fill="#d4674a" opacity=".5" filter="url(#bd2)"/>
  <path d="M431,252 L282,364 L294,376 L431,276 L568,376 L580,364 Z" fill="url(#broof)" filter="url(#bd2)"/>
  <path d="M431,252 L282,364" fill="none" stroke="#e8dcc2" stroke-width="5" stroke-linecap="round" opacity=".85" filter="url(#bb1)"/>
  <path d="M431,252 L580,364" fill="none" stroke="#3f1710" stroke-width="4" stroke-linecap="round" opacity=".55" filter="url(#bb1)"/>

  <!-- chimney -->
  <path d="M496,282 L524,282 L524,332 L496,316 Z" fill="#933624" filter="url(#bd2)"/>
  <path d="M492,272 L528,272 L528,284 L492,284 Z" fill="#f3ecd9" filter="url(#bd2)"/>
  <path d="M496,282 L504,282 L504,320 L496,316 Z" fill="#c25239" opacity=".7"/>

  <!-- gable round window -->
  <circle cx="431" cy="318" r="16" fill="#f3ecd9" filter="url(#bd2)"/>
  <circle cx="431" cy="318" r="10.5" fill="url(#bglass)"/>
  <path d="M426,313 l7,-4" stroke="#e2eef2" stroke-width="2" opacity=".6"/>

  <!-- upper windows -->
  <g>
    <rect x="336" y="392" width="52" height="60" fill="#f3ecd9" filter="url(#bd2)"/>
    <rect x="342" y="398" width="40" height="48" fill="url(#bglass)"/>
    <path d="M362,398 V446 M342,422 H382" stroke="#f3ecd9" stroke-width="3"/>
    <path d="M345,406 l13,-7" stroke="#eef6f8" stroke-width="3" opacity=".75"/>
    <rect x="332" y="450" width="60" height="7" fill="#f3ecd9" filter="url(#bd2)"/>
  </g>
  <g>
    <rect x="474" y="392" width="52" height="60" fill="#efe5cd" filter="url(#bd2)"/>
    <rect x="480" y="398" width="40" height="48" fill="url(#bglass)"/>
    <path d="M500,398 V446 M480,422 H520" stroke="#efe5cd" stroke-width="3"/>
    <path d="M483,406 l13,-7" stroke="#eef6f8" stroke-width="3" opacity=".6"/>
    <rect x="470" y="450" width="60" height="7" fill="#efe5cd" filter="url(#bd2)"/>
  </g>
  <!-- lower windows -->
  <g>
    <rect x="336" y="478" width="52" height="60" fill="#f3ecd9" filter="url(#bd2)"/>
    <rect x="342" y="484" width="40" height="48" fill="url(#bglass)"/>
    <path d="M362,484 V532 M342,508 H382" stroke="#f3ecd9" stroke-width="3"/>
    <path d="M345,492 l13,-7" stroke="#eef6f8" stroke-width="3" opacity=".75"/>
    <rect x="332" y="536" width="60" height="7" fill="#f3ecd9" filter="url(#bd2)"/>
  </g>
  <g>
    <rect x="474" y="478" width="52" height="60" fill="#efe5cd" filter="url(#bd2)"/>
    <rect x="480" y="484" width="40" height="48" fill="url(#bglass)"/>
    <path d="M500,484 V532 M480,508 H520" stroke="#efe5cd" stroke-width="3"/>
    <path d="M483,492 l13,-7" stroke="#eef6f8" stroke-width="3" opacity=".6"/>
    <rect x="470" y="536" width="60" height="7" fill="#efe5cd" filter="url(#bd2)"/>
  </g>

  <!-- door -->
  <rect x="400" y="466" width="62" height="94" fill="#f3ecd9" filter="url(#bd2)"/>
  <path d="M408,560 L408,486 Q431,472 454,486 L454,560 Z" fill="#64402a" filter="url(#bd2)"/>
  <path d="M414,552 L414,492 Q422,485 431,483" fill="none" stroke="#8a6034" stroke-width="3" opacity=".8"/>
  <circle cx="446" cy="522" r="3" fill="#e8dcc2" opacity=".9"/>
  <!-- step -->
  <path d="M394,560 L468,560 L474,572 L388,572 Z" fill="#e9dcbb" filter="url(#bd2)"/>
  <path d="M388,572 L474,572 L472,577 L390,577 Z" fill="#b3a377" opacity=".7"/>
</g>

<!-- shrubs at base -->
<g filter="url(#bd1)">
  <ellipse cx="322" cy="560" rx="38" ry="19" fill="#6d8a4a"/>
  <ellipse cx="308" cy="551" rx="24" ry="12" fill="#93af6c"/>
  <ellipse cx="330" cy="546" rx="18" ry="9" fill="#b7cd8d"/>
  <ellipse cx="540" cy="560" rx="42" ry="20" fill="#5f7a40"/>
  <ellipse cx="552" cy="551" rx="26" ry="12" fill="#87a460"/>
  <ellipse cx="532" cy="546" rx="18" ry="9" fill="#a8c48a"/>
</g>
<!-- coral blossoms -->
<g fill="#d98d6b">
  <circle cx="310" cy="552" r="2.6"/>
  <circle cx="330" cy="548" r="2.2"/>
  <circle cx="322" cy="558" r="2.4"/>
  <circle cx="546" cy="550" r="2.6"/>
  <circle cx="534" cy="556" r="2.2"/>
  <circle cx="556" cy="558" r="2.4"/>
</g>

<!-- grass stroke fields -->
<g stroke="#c9d195" stroke-width="2.6" opacity=".6">
  <use href="#ggrow" transform="translate(-10,616) scale(1.05)"/>
  <use href="#ggrow" transform="translate(390,620) scale(1.05)"/>
</g>
<g stroke="#6d8a4a" stroke-width="3" opacity=".6">
  <use href="#ggrow" transform="translate(-30,654) scale(1.3)"/>
  <use href="#ggrow" transform="translate(430,658) scale(1.3)"/>
</g>
<g stroke="#e0e2a4" stroke-width="3.4" opacity=".7">
  <use href="#ggrow" transform="translate(-20,698) scale(1.55)"/>
  <use href="#ggrow" transform="translate(400,694) scale(1.55)"/>
</g>
<g stroke="#54703c" stroke-width="3.8" opacity=".6">
  <use href="#ggrow" transform="translate(-40,744) scale(1.85)"/>
  <use href="#ggrow" transform="translate(380,748) scale(1.85)"/>
</g>
<g stroke="#cfd79b" stroke-width="4.2" opacity=".75">
  <use href="#ggrow" transform="translate(-30,796) scale(2.15)"/>
  <use href="#ggrow" transform="translate(400,800) scale(2.15)"/>
</g>
<g stroke="#46603a" stroke-width="4.4" opacity=".5">
  <use href="#ggrow" transform="translate(-60,828) scale(2.35)"/>
  <use href="#ggrow" transform="translate(390,832) scale(2.35)"/>
</g>

<!-- pig, back view on the lawn beside the front step -->
<g transform="translate(374,582) scale(.9)">
  <ellipse cx="3" cy="2" rx="29" ry="6" fill="#5a4a32" opacity=".35" filter="url(#bb3)"/>
  <path d="M-16,-13 L-16,-2 Q-16,0 -13,0 L-8,0 Q-6,0 -6,-2 L-6,-13 Z" fill="#8d5c48"/>
  <path d="M6,-13 L6,-2 Q6,0 8,0 L13,0 Q16,0 16,-2 L16,-13 Z" fill="#7a4e3c"/>
  <path d="M0,-54 C12,-54 22,-47 25,-36 C28,-25 27,-14 22,-8 C15,-10 8,-11 0,-11 C-8,-11 -15,-10 -22,-8 C-27,-14 -28,-25 -25,-36 C-22,-47 -12,-54 0,-54 Z" fill="#9c6a52"/>
  <ellipse cx="0" cy="-52" rx="12" ry="8" fill="#9c6a52"/>
  <path d="M9,-49 C18,-43 24,-32 23,-19 C22,-12 20,-10 22,-8 C27,-14 28,-25 25,-36 C23,-45 17,-52 9,-49 Z" fill="#7a4e3c" opacity=".75" filter="url(#bb1)"/>
  <path d="M-11,-55 C-15,-60 -16,-65 -12,-68 C-8,-66 -6,-61 -7,-55 Z" fill="#8d5c48"/>

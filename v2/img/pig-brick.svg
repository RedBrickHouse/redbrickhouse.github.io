  <path d="M0,-24 c5,-1 8,2 7,6 c-1,4 -6,5 -8,2" fill="none" stroke="#c08a6e" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M-14,-52 C-6,-56 6,-56 14,-52" fill="none" stroke="#c08a6e" stroke-width="6" stroke-linecap="round" opacity=".55" filter="url(#bb3)"/>
  <path d="M-22,-9 C-27,-15 -28,-26 -25,-36 C-22,-46 -13,-53 -3,-54" fill="none" stroke="#fff1d6" stroke-width="3.8" stroke-linecap="round" opacity="1" filter="url(#bb1)"/>
  <path d="M-12,-56 C-15,-61 -15,-65 -12,-67" fill="none" stroke="#fff1d6" stroke-width="2.4" stroke-linecap="round" opacity=".95" filter="url(#bb1)"/>

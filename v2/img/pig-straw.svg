<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Straw hut in a golden wheat field at noon">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fdf8ea"/>
    <stop offset=".45" stop-color="#fcedc6"/>
    <stop offset="1" stop-color="#f7dc9d"/>
  </linearGradient>
  <radialGradient id="sun" cx=".30" cy=".18" r=".65">
    <stop offset="0" stop-color="#fffef6" stop-opacity="1"/>
    <stop offset=".35" stop-color="#fff5d4" stop-opacity=".6"/>
    <stop offset="1" stop-color="#fff5d4" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="fieldMid" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#f0ca79"/>
    <stop offset="1" stop-color="#e0a94f"/>
  </linearGradient>
  <linearGradient id="fieldFore" x1=".15" y1="0" x2=".65" y2="1">
    <stop offset="0" stop-color="#dda64e"/>
    <stop offset=".55" stop-color="#c28839"/>
    <stop offset="1" stop-color="#a06d2b"/>
  </linearGradient>
  <linearGradient id="wallG" x1="0" y1="0" x2="1" y2=".15">
    <stop offset="0" stop-color="#eec46e"/>
    <stop offset=".6" stop-color="#d9a851"/>
    <stop offset="1" stop-color="#bd8c3c"/>
  </linearGradient>
  <linearGradient id="roofG" x1="0" y1="0" x2="1" y2=".08">
    <stop offset="0" stop-color="#f7dc95"/>
    <stop offset=".55" stop-color="#dcae59"/>
    <stop offset="1" stop-color="#b38436"/>
  </linearGradient>
  <radialGradient id="vig" cx=".5" cy=".46" r=".8">
    <stop offset=".58" stop-color="#8a5f28" stop-opacity="0"/>
    <stop offset="1" stop-color="#8a5f28" stop-opacity=".15"/>
  </radialGradient>
  <filter id="d1" x="-12%" y="-12%" width="124%" height="124%">
    <feTurbulence type="fractalNoise" baseFrequency=".012 .02" numOctaves="3" seed="11" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="16"/>
  </filter>
  <filter id="d2" x="-14%" y="-14%" width="128%" height="128%">
    <feTurbulence type="fractalNoise" baseFrequency=".03 .05" numOctaves="2" seed="4" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="9"/>
  </filter>
  <filter id="cl" x="-40%" y="-40%" width="180%" height="180%">
    <feTurbulence type="fractalNoise" baseFrequency=".016 .03" numOctaves="3" seed="8" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="26" result="d"/>
    <feGaussianBlur in="d" stdDeviation="5"/>
  </filter>
  <filter id="b1" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.2"/></filter>
  <filter id="b3" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3"/></filter>
  <filter id="b8" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="8"/></filter>
  <filter id="b16" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="16"/></filter>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" seed="7"/>
    <feColorMatrix type="matrix" values="0 0 0 0 .45  0 0 0 0 .33  0 0 0 0 .18  0 0 0 .6 0"/>
  </filter>
  <g id="frow" fill="none" stroke-linecap="round">
    <path d="M0,0 c-1,-8 -2,-14 -4,-20"/>
    <path d="M19,2 c0,-9 0,-16 1,-24"/>
    <path d="M38,0 c1,-7 3,-13 6,-18"/>
    <path d="M57,1 c-1,-9 -1,-15 0,-22"/>
    <path d="M76,0 c-2,-8 -4,-14 -7,-19"/>
    <path d="M95,2 c1,-9 1,-17 0,-25"/>
    <path d="M114,0 c2,-8 4,-13 7,-17"/>
    <path d="M133,1 c0,-8 -1,-15 -2,-21"/>
    <path d="M152,0 c1,-9 2,-16 4,-22"/>
    <path d="M171,2 c-1,-8 -2,-14 -3,-20"/>
    <path d="M190,0 c0,-8 1,-15 3,-21"/>
    <path d="M209,1 c-2,-9 -3,-15 -3,-22"/>
    <path d="M228,0 c1,-8 2,-14 2,-20"/>
    <path d="M247,2 c0,-9 -1,-16 -3,-23"/>
    <path d="M266,0 c2,-8 3,-14 3,-20"/>
    <path d="M285,1 c-1,-8 -1,-14 0,-20"/>
    <path d="M304,0 c-2,-9 -3,-16 -2,-23"/>
    <path d="M323,2 c1,-8 2,-14 4,-19"/>
    <path d="M342,0 c0,-8 0,-15 1,-21"/>
    <path d="M361,1 c-1,-8 -2,-14 -2,-20"/>
  </g>
  <g id="wheat">
    <path d="M0,0 C-1,-11 -1,-22 1,-32" fill="none" stroke-linecap="round" stroke-width="2"/>
    <path d="M1,-33 l-2,-6 M1,-33 l0,-8 M1,-33 l2,-6" fill="none" stroke-linecap="round" stroke-width="1.1"/>
    <ellipse cx="1" cy="-36" rx="2.2" ry="6" stroke="none"/>
  </g>
</defs>

<!-- sky -->
<rect width="800" height="800" fill="url(#sky)"/>
<rect width="800" height="800" fill="url(#sun)"/>

<!-- soft warm clouds -->
<g filter="url(#cl)">
  <g fill="#fff8e0" opacity=".85">
    <ellipse cx="196" cy="190" rx="92" ry="22"/>
    <ellipse cx="248" cy="174" rx="52" ry="16"/>
    <ellipse cx="150" cy="180" rx="42" ry="13"/>
  </g>
  <ellipse cx="210" cy="198" rx="78" ry="10" fill="#efd9a4" opacity=".5"/>
  <g fill="#fff8e0" opacity=".8">
    <ellipse cx="606" cy="256" rx="76" ry="17"/>
    <ellipse cx="650" cy="243" rx="44" ry="13"/>
  </g>
  <ellipse cx="618" cy="262" rx="60" ry="8" fill="#efd9a4" opacity=".45"/>
  <ellipse cx="440" cy="130" rx="52" ry="11" fill="#fff8e0" opacity=".6"/>
</g>

<!-- rolling far hills -->
<path d="M-30,472 C140,436 330,444 470,464 C610,482 720,470 830,448 L830,640 L-30,640 Z" fill="#ead294" opacity=".92" filter="url(#d1)"/>
<g fill="#cbb06a" opacity=".5" filter="url(#d2)">
  <ellipse cx="128" cy="474" rx="26" ry="10"/>
  <ellipse cx="170" cy="479" rx="20" ry="8"/>
  <ellipse cx="656" cy="478" rx="28" ry="10"/>
  <ellipse cx="706" cy="472" rx="20" ry="8"/>
</g>
<path d="M-30,516 C120,494 300,488 480,500 C640,510 750,504 830,494 L830,660 L-30,660 Z" fill="#dcb965" opacity=".95" filter="url(#d1)"/>

<!-- mid field -->
<path d="M-30,540 C200,528 560,528 830,538 L830,680 L-30,680 Z" fill="url(#fieldMid)" filter="url(#d1)"/>
<g fill="none" stroke-linecap="round" filter="url(#d1)">
  <path d="M-20,560 C240,548 560,548 820,556" stroke="#f4d488" stroke-width="10" opacity=".35"/>
  <path d="M-20,584 C240,572 560,574 820,582" stroke="#c98d3a" stroke-width="9" opacity=".3"/>
</g>
<g stroke="#cf9a44" stroke-width="2" opacity=".3">
  <use href="#frow" transform="translate(-10,562) scale(.75)"/>
  <use href="#frow" transform="translate(280,564) scale(.75)"/>
  <use href="#frow" transform="translate(560,562) scale(.75)"/>
</g>
<g stroke="#f4d488" stroke-width="2.2" opacity=".32">
  <use href="#frow" transform="translate(-30,586) scale(.85)"/>
  <use href="#frow" transform="translate(300,588) scale(.85)"/>
  <use href="#frow" transform="translate(600,586) scale(.85)"/>
</g>

<!-- clearing + hut cast shadow -->
<ellipse cx="430" cy="574" rx="140" ry="17" fill="#e8c169" opacity=".5" filter="url(#b8)"/>
<ellipse cx="486" cy="570" rx="150" ry="19" fill="#8a5f28" opacity=".32" filter="url(#b8)"/>

<!-- hut -->
<g>
  <path d="M342,452 L518,452 L524,566 L336,566 Z" fill="url(#wallG)" filter="url(#d2)"/>
  <g stroke-linecap="round" opacity=".5" filter="url(#d2)">
    <path d="M344,474 H516" stroke="#c2913f" stroke-width="2.5"/>
    <path d="M343,494 H517" stroke="#f2d78e" stroke-width="2"/>
    <path d="M342,514 H518" stroke="#bd8b3b" stroke-width="2.5"/>
    <path d="M341,534 H519" stroke="#f2d78e" stroke-width="2"/>
    <path d="M340,552 H520" stroke="#b5822f" stroke-width="2.5"/>
  </g>
  <path d="M348,452 L356,566 L336,566 L342,452 Z" fill="#f6dc9b" opacity=".55" filter="url(#d2)"/>
  <path d="M506,452 L524,566 L498,566 L494,452 Z" fill="#a4702c" opacity=".5" filter="url(#d2)"/>
  <!-- eave shadow on wall -->
  <path d="M340,452 L520,452 L518,474 L342,474 Z" fill="#8a5f28" opacity=".3" filter="url(#b3)"/>

  <!-- window -->
  <rect x="362" y="492" width="26" height="26" rx="2" fill="#5a3c19"/>
  <rect x="362" y="492" width="26" height="26" rx="2" fill="none" stroke="#e8c169" stroke-width="4.5" opacity=".95"/>
  <path d="M375,494 V516" stroke="#e8c169" stroke-width="2.5" opacity=".9"/>

  <!-- door -->
  <path d="M402,566 L402,494 Q430,472 458,494 L458,566 Z" fill="#5f3d18" filter="url(#d2)"/>
  <path d="M402,566 L402,494 Q430,472 458,494" fill="none" stroke="#3f2810" stroke-width="4" opacity=".7"/>
  <path d="M406,560 L406,496 Q418,485 430,483" fill="none" stroke="#8a5f28" stroke-width="3" opacity=".7"/>

  <!-- roof -->
  <path d="M430,298 C392,318 330,392 296,452 L302,466 C340,455 520,455 558,466 L564,452 C530,392 468,318 430,298 Z" fill="url(#roofG)" filter="url(#d2)"/>
  <!-- thatch topknot -->
  <path d="M414,304 C420,290 440,290 446,304 C440,298 420,298 414,304 Z" fill="#e8c169" filter="url(#d2)"/>
  <path d="M418,300 q12,-8 24,0" fill="none" stroke="#f9e7ae" stroke-width="4" stroke-linecap="round" opacity=".9" filter="url(#b1)"/>
  <path d="M430,298 C392,318 330,392 296,452" fill="none" stroke="#fbe9b4" stroke-width="8" stroke-linecap="round" opacity=".85" filter="url(#b1)"/>
  <path d="M430,298 C468,318 530,392 564,452" fill="none" stroke="#a06d2b" stroke-width="6" stroke-linecap="round" opacity=".5" filter="url(#b1)"/>
  <!-- thatch combing -->
  <g fill="none" stroke-linecap="round" filter="url(#d2)">
    <path d="M418,314 C400,342 372,400 352,450" stroke="#c79947" stroke-width="4" opacity=".42"/>
    <path d="M430,308 C420,346 402,408 392,452" stroke="#f6dc9b" stroke-width="4" opacity=".48"/>
    <path d="M436,312 C436,352 434,412 432,454" stroke="#c79947" stroke-width="4" opacity=".4"/>
    <path d="M444,316 C454,354 468,412 476,452" stroke="#f6dc9b" stroke-width="4" opacity=".42"/>
    <path d="M452,324 C470,358 496,410 514,452" stroke="#b5822f" stroke-width="4" opacity=".44"/>
    <path d="M410,324 C390,354 362,410 342,452" stroke="#f6dc9b" stroke-width="3.5" opacity=".38"/>
    <path d="M460,336 C480,368 510,416 530,452" stroke="#c79947" stroke-width="3.5" opacity=".38"/>
    <path d="M424,320 C412,356 398,414 392,452" stroke="#b5822f" stroke-width="3" opacity=".3"/>
    <path d="M438,320 C446,358 456,414 462,452" stroke="#c79947" stroke-width="3" opacity=".3"/>
  </g>
  <!-- ragged eave shadow -->
  <path d="M302,464 C340,453 520,453 558,464 L556,472 C518,462 342,462 304,472 Z" fill="#8a5f28" opacity=".4" filter="url(#d2)"/>
</g>

<!-- foreground field -->
<path d="M-30,590 C220,574 560,576 830,588 L830,820 L-30,820 Z" fill="url(#fieldFore)" filter="url(#d1)"/>
<!-- tonal patches -->
<g filter="url(#b16)">
  <ellipse cx="250" cy="652" rx="170" ry="38" fill="#f4d488" opacity=".32"/>
  <ellipse cx="620" cy="700" rx="180" ry="44" fill="#b8813a" opacity=".3"/>
  <ellipse cx="150" cy="762" rx="150" ry="42" fill="#a06d2b" opacity=".3"/>
  <ellipse cx="440" cy="636" rx="150" ry="30" fill="#ffedb2" opacity=".28"/>
  <ellipse cx="700" cy="790" rx="160" ry="44" fill="#8f6226" opacity=".26"/>
</g>
<!-- light sweep -->
<path d="M-30,648 L830,592 L830,650 L-30,732 Z" fill="#ffe9ad" opacity=".3" filter="url(#b16)"/>

<!-- stroke fields -->
<g stroke="#cf9a44" stroke-width="2.6" opacity=".55">
  <use href="#frow" transform="translate(-10,618) scale(1.05)"/>
  <use href="#frow" transform="translate(390,622) scale(1.05)"/>
</g>
<g stroke="#eec26c" stroke-width="2.8" opacity=".6">
  <use href="#frow" transform="translate(-30,652) scale(1.25)"/>
  <use href="#frow" transform="translate(430,656) scale(1.25)"/>
</g>
<g stroke="#a9752f" stroke-width="3.2" opacity=".6">
  <use href="#frow" transform="translate(-20,694) scale(1.5)"/>
  <use href="#frow" transform="translate(400,690) scale(1.5)"/>
</g>
<g stroke="#f1cd7f" stroke-width="3.6" opacity=".7">
  <use href="#frow" transform="translate(-40,738) scale(1.8)"/>
  <use href="#frow" transform="translate(380,742) scale(1.8)"/>
</g>
<g stroke="#8f6226" stroke-width="4" opacity=".6">
  <use href="#frow" transform="translate(-30,788) scale(2.1)"/>
  <use href="#frow" transform="translate(400,792) scale(2.1)"/>
</g>
<g stroke="#f6dc9b" stroke-width="4.2" opacity=".75">
  <use href="#frow" transform="translate(-60,822) scale(2.3)"/>
  <use href="#frow" transform="translate(390,826) scale(2.3)"/>
</g>

<!-- wheat heads -->
<g stroke="#b0762c" fill="#e2b25c">
  <use href="#wheat" transform="translate(90,712) scale(1.5) rotate(-5)"/>
  <use href="#wheat" transform="translate(210,742) scale(1.7) rotate(4)"/>
  <use href="#wheat" transform="translate(680,724) scale(1.6) rotate(-6)"/>
</g>
<g stroke="#8f6226" fill="#d9a64d">
  <use href="#wheat" transform="translate(60,802) scale(2.4) rotate(-7)"/>
  <use href="#wheat" transform="translate(150,816) scale(2.6) rotate(3)"/>
  <use href="#wheat" transform="translate(320,808) scale(2.3) rotate(-3)"/>
  <use href="#wheat" transform="translate(590,812) scale(2.5) rotate(6)"/>
  <use href="#wheat" transform="translate(736,800) scale(2.4) rotate(-4)"/>
</g>
<g stroke="#f6dc9b" fill="#f9e7ae">
  <use href="#wheat" transform="translate(104,812) scale(2.5) rotate(5)"/>
  <use href="#wheat" transform="translate(262,818) scale(2.4) rotate(-6)"/>
  <use href="#wheat" transform="translate(452,814) scale(2.6) rotate(2)"/>
  <use href="#wheat" transform="translate(676,818) scale(2.5) rotate(-2)"/>
</g>

<!-- straw wisps slipping off the roof edge -->
<g fill="none" stroke-linecap="round" filter="url(#b1)">
  <path d="M548,428 l30,10" stroke="#cf9a44" stroke-width="3.2" opacity=".8"/>
  <path d="M550,427 l26,9" stroke="#f9e7ae" stroke-width="1.5" opacity=".9"/>
  <path d="M556,450 l32,6" stroke="#c89440" stroke-width="2.8" opacity=".65"/>
  <path d="M576,472 l26,8" stroke="#b5822f" stroke-width="2.6" opacity=".5"/>
  <path d="M560,552 l26,4 M594,560 l20,3" stroke="#e8c169" stroke-width="3" opacity=".8"/>
</g>

<!-- pig, back view -->
<g transform="translate(296,576) scale(.95)">
  <ellipse cx="3" cy="2" rx="29" ry="6" fill="#6b4113" opacity=".32" filter="url(#b3)"/>
  <path d="M-16,-13 L-16,-2 Q-16,0 -13,0 L-8,0 Q-6,0 -6,-2 L-6,-13 Z" fill="#6f4522"/>
  <path d="M6,-13 L6,-2 Q6,0 8,0 L13,0 Q16,0 16,-2 L16,-13 Z" fill="#5f3c1e"/>
  <path d="M0,-54 C12,-54 22,-47 25,-36 C28,-25 27,-14 22,-8 C15,-10 8,-11 0,-11 C-8,-11 -15,-10 -22,-8 C-27,-14 -28,-25 -25,-36 C-22,-47 -12,-54 0,-54 Z" fill="#734823"/>
  <ellipse cx="0" cy="-52" rx="12" ry="8" fill="#734823"/>
  <path d="M9,-49 C18,-43 24,-32 23,-19 C22,-12 20,-10 22,-8 C27,-14 28,-25 25,-36 C23,-45 17,-52 9,-49 Z" fill="#5b3719" opacity=".7" filter="url(#b1)"/>
  <path d="M-11,-55 C-15,-60 -16,-65 -12,-68 C-8,-66 -6,-61 -7,-55 Z" fill="#6a421f"/>
  <path d="M11,-55 C15,-60 16,-65 12,-68 C8,-66 6,-61 7,-55 Z" fill="#59371b"/>
  <path d="M0,-24 c5,-1 8,2 7,6 c-1,4 -6,5 -8,2" fill="none" stroke="#9a6a3c" stroke-width="2.2" stroke-linecap="round" opacity=".85"/>
  <path d="M-14,-52 C-6,-56 6,-56 14,-52" fill="none" stroke="#b98a4f" stroke-width="6" stroke-linecap="round" opacity=".55" filter="url(#b3)"/>
  <path d="M-22,-9 C-27,-15 -28,-26 -25,-36 C-22,-46 -13,-53 -3,-54" fill="none" stroke="#ffe6a8" stroke-width="3.8" stroke-linecap="round" opacity="1" filter="url(#b1)"/>
  <path d="M-12,-56 C-15,-61 -15,-65 -12,-67" fill="none" stroke="#ffe6a8" stroke-width="2.4" stroke-linecap="round" opacity=".95" filter="url(#b1)"/>
</g>

<!-- vignette + grain -->
<rect width="800" height="800" fill="url(#vig)"/>
<rect width="800" height="800" filter="url(#grain)" opacity=".08"/>
</svg>
